<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#184e77">
  <link rel="icon" href="notes-icon.svg" type="image/svg+xml">
  <title>Notes Summary</title>
  <link rel="stylesheet" href="notes-app.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="notes-cloud-config.js"></script>
  <script src="notes-auth.js"></script>
</head>
<body>
  <div class="app-shell summary-page-shell">
    <header class="topbar summary-topbar">
      <div class="brand">
        <p class="eyebrow">Summary</p>
        <h1>Plain notes summary</h1>
        <p class="subtle" id="summaryStatus">Loading notes...</p>
      </div>
      <div class="topbar-actions">
        <a class="button-link secondary" href="notes-app.html">Back</a>
      </div>
    </header>

    <main class="panel summary-panel">
      <div class="panel-header compact-header">
        <div>
          <p class="eyebrow">Live text</p>
          <h2>Summary</h2>
        </div>
      </div>
      <pre id="summaryText" class="summary-text">Loading...</pre>
    </main>
  </div>

  <script src="summary.js"></script>
</body>
</html>
